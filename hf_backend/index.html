<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: rgba(30, 41, 59, 0.4);
            --surface-hover: rgba(30, 41, 59, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            line-height: 1.5;
        }

        .container {
            width: 90vw;
            height: 90vh;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: auto 1fr;
            gap: 1.5rem;
        }

        /* Bento Cards */
        .card {
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Header Card */
        .header-card {
            grid-column: span 12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.5rem;
        }

        .logo-group h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 999px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Upload Card */
        .upload-card {
            grid-column: span 4;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .upload-zone {
            flex: 1;
            border: 2px dashed var(--border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.01);
        }

        .upload-zone:hover,
        .upload-zone.dragging {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-icon {
            font-size: 2.5rem;
            background: rgba(99, 102, 241, 0.1);
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            color: var(--primary);
        }

        .upload-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .upload-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        /* Stats Cards */
        .stat-card {
            grid-column: span 3;
            grid-row: span 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        /* Queue Card */
        .queue-card {
            grid-column: span 8;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* Table */
        .table-container {
            flex: 1;
            overflow-y: auto;
            margin-right: -0.5rem;
            padding-right: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem 0.5rem;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .status-pill {
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .pill-not_started {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
        }

        .pill-processing {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }

        .pill-completed {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .pill-failed {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .btn-view {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 0.4rem;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 800px;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 2rem;
            overflow-y: auto;
        }

        pre {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #34d399;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .card {
                grid-column: span 12 !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="card header-card">
            <div class="logo-group">
                <h1>OCR</h1>
            </div>
            <div class="status-badge">
                <div class="status-dot" id="healthDot"></div>
                <span id="healthText">Service Online</span>
            </div>
        </header>

        <!-- Upload -->
        <div class="card upload-card">
            <div class="card-header">
                <span class="card-title">Input</span>
            </div>
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">↑</div>
                <div>
                    <p style="font-weight: 600;">Drop image here</p>
                    <p style="font-size: 0.8rem; color: var(--text-dim);">PNG, JPG, PDF, TIFF</p>
                </div>
                <input type="file" id="fileInput" hidden accept="image/*,application/pdf">
            </div>
            <button class="upload-btn" id="uploadBtn">Process Image</button>
        </div>

        <!-- Queue -->
        <div class="card queue-card">
            <div class="card-header">
                <span class="card-title">Recent Activity</span>
                <button class="refresh-btn" onclick="loadFiles()">Refresh</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>File</th>
                            <th>Status</th>
                            <th>Progress</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="queueBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="card-title">Extracted Content</span>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="resultText"></pre>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let filesData = [];

        // Elements
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const queueBody = document.getElementById('queueBody');

        // Drag & Drop
        uploadZone.onclick = () => fileInput.click();
        uploadZone.ondragover = (e) => { e.preventDefault(); uploadZone.classList.add('dragging'); };
        uploadZone.ondragleave = () => uploadZone.classList.remove('dragging');
        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragging');
            handleFile(e.dataTransfer.files[0]);
        };

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            window.selectedFile = file;
            uploadZone.querySelector('p').innerText = file.name;
        }

        document.getElementById('uploadBtn').onclick = async () => {
            if (!window.selectedFile) return alert('Select a file first');

            const formData = new FormData();
            formData.append('image', window.selectedFile);

            try {
                const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                if (res.ok) {
                    window.selectedFile = null;
                    uploadZone.querySelector('p').innerText = 'Drop image here';
                    loadFiles();
                }
            } catch (err) { console.error(err); }
        };

        async function loadFiles() {
            try {
                const res = await fetch(`${API_BASE}/files`);
                const data = await res.json();
                filesData = data;
                renderQueue(data);
            } catch (err) { console.error(err); }
        }

        function renderQueue(files) {
            if (files.length === 0) {
                queueBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:3rem; color:var(--text-dim);">No tasks found</td></tr>';
                return;
            }

            queueBody.innerHTML = files.map(f => `
                <tr>
                    <td style="font-weight:500;">${f.filename}</td>
                    <td><span class="status-pill pill-${f.status}">${f.status.replace('_', ' ')}</span></td>
                    <td>
                        <div style="width:100px; height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden;">
                            <div style="width:${f.progress}%; height:100%; background:var(--primary);"></div>
                        </div>
                    </td>
                    <td>
                        ${f.status === 'completed' ? `<button class="btn-view" onclick="showResult('${f.id}')">View</button>` : '—'}
                    </td>
                </tr>
            `).join('');
        }


        async function showResult(id) {
            const res = await fetch(`${API_BASE}/files/${id}`);
            const data = await res.json();
            const text = data.ocr_text;

            let formatted = text;
            try {
                const parsed = JSON.parse(text);
                formatted = JSON.stringify(parsed, null, 2);
            } catch (e) { }

            document.getElementById('resultText').innerText = formatted;
            document.getElementById('resultModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
        }

        // Health Check
        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                const dot = document.getElementById('healthDot');
                dot.style.background = data.status === 'healthy' ? 'var(--success)' : 'var(--error)';
                dot.style.boxShadow = `0 0 10px ${data.status === 'healthy' ? 'var(--success)' : 'var(--error)'}`;
            } catch (e) { }
        }

        // Init
        loadFiles();
        setInterval(loadFiles, 5000);
        setInterval(checkHealth, 10000);
    </script>
</body>

</html>
