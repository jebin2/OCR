<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e27;
            --surface: #141b3d;
            --primary: #00ff88;
            --secondary: #ff00ff;
            --accent: #00d4ff;
            --error: #ff1744;
            --text: #ffffff;
            --border: 4px;
        }

        body {
            font-family: 'Space Grotesk', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .upload-section {
            background: var(--surface);
            border: var(--border) solid var(--primary);
            box-shadow: 8px 8px 0 var(--primary);
            padding: 2rem;
            margin-bottom: 3rem;
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.2s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-section:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0 var(--primary);
        }

        .upload-zone {
            border: 3px dashed var(--accent);
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.05);
        }

        .upload-zone:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--primary);
        }

        .upload-zone.dragging {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--primary);
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: var(--primary);
            color: var(--bg);
            border: var(--border) solid var(--bg);
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0 var(--bg);
            letter-spacing: 1px;
        }

        .btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--bg);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--accent);
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            box-shadow: 3px 3px 0 var(--bg);
        }

        .table-section {
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.4s both;
        }

        .table-wrapper {
            overflow-x: auto;
            background: var(--surface);
            border: var(--border) solid var(--secondary);
            box-shadow: 8px 8px 0 var(--secondary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

        th {
            padding: 1.5rem 1rem;
            text-align: left;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--bg);
            border-right: 3px solid var(--bg);
        }

        th:last-child {
            border-right: none;
        }

        tbody tr {
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        td {
            padding: 1.5rem 1rem;
        }

        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            border: 3px solid;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .status-not_started { background: var(--bg); border-color: var(--accent); color: var(--accent); }
        .status-processing { background: var(--bg); border-color: var(--primary); color: var(--primary); animation: pulse 1.5s ease-in-out infinite; }
        .status-completed { background: var(--primary); border-color: var(--primary); color: var(--bg); }
        .status-failed { background: var(--error); border-color: var(--error); color: var(--text); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .caption-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--accent); font-size: 1.2rem; }

        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--secondary);
            border: var(--border) solid var(--bg);
            box-shadow: 4px 4px 0 var(--bg);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 1000;
        }

        .refresh-btn:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 6px 6px 0 var(--bg);
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 6px solid var(--surface);
            border-top: 6px solid var(--primary);
            border-right: 6px solid var(--accent);
            border-bottom: 6px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loader-text {
            position: absolute;
            margin-top: 120px;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--surface);
            border: var(--border) solid var(--primary);
            box-shadow: 12px 12px 0 var(--primary);
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 2rem 1rem 2rem;
            border-bottom: 3px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
        }

        .modal-close {
            background: var(--error);
            color: var(--text);
            border: 3px solid var(--bg);
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 900;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0 var(--bg);
        }

        .modal-close:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 var(--bg);
        }

        .code-block {
            background: var(--bg);
            border: 3px solid var(--accent);
            padding: 1.5rem;
            overflow-y: auto;
            margin: 1.5rem 2rem 2rem 2rem;
            flex: 1;
        }

        .code-block code {
            font-family: 'Courier New', monospace;
            color: var(--primary);
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            position: sticky;
            top: 0.5rem;
            float: right;
            background: var(--accent);
            color: var(--bg);
            border: 3px solid var(--bg);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--bg);
            z-index: 5;
        }

        .copy-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--bg);
        }

        .copy-btn.copied { background: var(--primary); }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            th, td { padding: 1rem 0.5rem; font-size: 0.9rem; }
            .caption-cell { max-width: 100px; }
        }

        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1.5rem 2rem;
            background: var(--primary);
            color: var(--bg);
            border: var(--border) solid var(--bg);
            box-shadow: 6px 6px 0 var(--bg);
            font-weight: 900;
            z-index: 2000;
            animation: slideInRight 0.5s ease, slideOutRight 0.5s ease 3.5s;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            to { transform: translateX(400px); opacity: 0; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>OCR Runner</h1>
            <p class="subtitle">Extract Text from Images</p>
        </header>

        <div class="upload-section">
            <h2 style="margin-bottom: 1.5rem; color: var(--primary);">Upload Image</h2>
            <div class="upload-zone" id="uploadZone">
                <p style="font-size: 1.2rem; margin-bottom: 1rem;">📁 Drop image here or click to browse</p>
                <p style="color: var(--accent); font-size: 0.9rem;">Supported: PNG, JPG, JPEG, BMP, TIFF, WebP, GIF, PDF</p>
                <input type="file" id="imageFile" accept=".png,.jpg,.jpeg,.bmp,.tiff,.tif,.webp,.gif,.pdf">
            </div>
            <button class="btn" id="uploadBtn" style="margin-top: 1.5rem; width: 100%;">
                🚀 Upload & Process
            </button>
        </div>

        <div class="table-section">
            <h2 style="margin-bottom: 1.5rem; color: var(--secondary);">Processing Queue</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Filename</th>
                            <th>Status</th>
                            <th>Est. Wait</th>
                            <th>Text</th>
                            <th>Created</th>
                            <th>Processed</th>
                        </tr>
                    </thead>
                    <tbody id="filesTable">
                        <tr>
                            <td colspan="6" class="empty-state">No files uploaded yet. Start by uploading an image!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <button class="refresh-btn" id="refreshBtn" title="Refresh">🔄</button>

    <div class="loader-overlay" id="loader">
        <div>
            <div class="loader"></div>
            <div class="loader-text">Uploading...</div>
        </div>
    </div>

    <div class="modal" id="textModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📄 OCR Text</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="code-block">
                <button class="copy-btn" onclick="copyText()">📋 Copy</button>
                <code id="textCode"></code>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let selectedFile = null;
        const textStore = new Map();

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('imageFile');
        const loader = document.getElementById('loader');
        const uploadBtn = document.getElementById('uploadBtn');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragging');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragging');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                selectedFile = file;
                showNotification(`Selected: ${file.name}`);
            }
        });

        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                showNotification(`Selected: ${selectedFile.name}`);
                if (pendingUpload) {
                    pendingUpload = false;
                    uploadFile();
                }
            }
        });

        let pendingUpload = false;

        async function uploadFile() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('image', selectedFile);

            loader.style.display = 'flex';
            uploadBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showNotification('File uploaded successfully! 🎉');
                    selectedFile = null;
                    fileInput.value = '';
                    loadFiles();
                } else {
                    showNotification(data.error || 'Upload failed', 'error');
                }
            } catch (error) {
                showNotification('Network error: ' + error.message, 'error');
            } finally {
                loader.style.display = 'none';
                uploadBtn.disabled = false;
            }
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                pendingUpload = true;
                fileInput.click();
                return;
            }
            uploadFile();
        });

        async function loadFiles() {
            try {
                const response = await fetch(`${API_URL}/files`);
                const files = await response.json();

                const tbody = document.getElementById('filesTable');
                textStore.clear();

                if (files.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No files uploaded yet. Start by uploading an image!</td></tr>';
                    return;
                }

                tbody.innerHTML = files.map(file => {
                    if (file.ocr_text) {
                        textStore.set(file.id, file.ocr_text);
                    }

                    const textPreview = file.ocr_text ?
                        (file.ocr_text.length > 50 ? file.ocr_text.substring(0, 50) + '...' : file.ocr_text) :
                        '—';

                    let estWait = '—';
                    if (file.status === 'not_started' && file.estimated_start_seconds !== null) {
                        const seconds = file.estimated_start_seconds;
                        if (seconds < 60) {
                            estWait = `${seconds}s`;
                        } else if (seconds < 3600) {
                            const mins = Math.floor(seconds / 60);
                            const secs = seconds % 60;
                            estWait = secs > 0 ? `${mins}m ${secs}s` : `${mins}m`;
                        } else {
                            const hours = Math.floor(seconds / 3600);
                            const mins = Math.floor((seconds % 3600) / 60);
                            estWait = mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
                        }
                        if (file.queue_position) {
                            estWait = `#${file.queue_position} (${estWait})`;
                        }
                    } else if (file.status === 'processing') {
                        estWait = '⏳ Processing...';
                    }

                    return `
                    <tr>
                        <td><strong>${file.filename}</strong></td>
                        <td><span class="status status-${file.status}">${file.status.replace('_', ' ')}</span></td>
                        <td>${estWait}</td>
                        <td class="caption-cell">
                            ${file.ocr_text ?
                            `<button class="btn btn-small btn-secondary" onclick="showText('${file.id}')" style="margin-left: 0.5rem;">Show</button>`
                            : '—'}
                        </td>
                        <td>${new Date(file.created_at).toLocaleString()}</td>
                        <td>${file.processed_at ? new Date(file.processed_at).toLocaleString() : '—'}</td>
                    </tr>
                `;
                }).join('');
            } catch (error) {
                console.error('Error loading files:', error);
            }
        }

        function showText(fileId) {
            const text = textStore.get(fileId);
            if (!text) return;

            const modal = document.getElementById('textModal');
            const codeBlock = document.getElementById('textCode');

            let formattedText = text;
            try {
                const parsed = JSON.parse(text);
                formattedText = JSON.stringify(parsed, null, 2);
            } catch (e) {
                formattedText = text;
            }

            codeBlock.textContent = formattedText;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('textModal').classList.remove('active');
        }

        function copyText() {
            const codeBlock = document.getElementById('textCode');
            const copyBtn = event.target;

            navigator.clipboard.writeText(codeBlock.textContent).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied!';
                copyBtn.classList.add('copied');

                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }

        document.getElementById('textModal').addEventListener('click', (e) => {
            if (e.target.id === 'textModal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        document.getElementById('refreshBtn').addEventListener('click', loadFiles);
        setInterval(loadFiles, 1000 * 60 * 10);

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            if (type === 'error') notification.style.background = 'var(--error)';
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }

        loadFiles();
    </script>
</body>

</html>
