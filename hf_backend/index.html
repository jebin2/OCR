<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;800&family=Permanent+Marker&family=Patrick+Hand&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #334155;
            --surface: #7dd3fc;
            --surface-hover: #38bdf8;
            --border: #0f172a;
            --border-width: 3px;
            --primary: #0f172a;
            --primary-light: #bae6fd;
            --success: #14532d;
            --success-light: #86efac;
            --error: #7f1d1d;
            --error-light: #fca5a5;
            --text-main: #0f172a;
            --text-dim: #1e1b4b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            line-height: 1.5;
        }

        .container {
            width: 90vw;
            height: 90vh;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: auto 1fr;
            gap: 1.5rem;
        }

        /* Paper Cards */
        .card {
            background: var(--surface);
            border: var(--border-width) solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 4px 4px 0px 0px var(--border);
        }

        .card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--border);
        }

        /* Header Card */
        .header-card {
            grid-column: span 12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2.5rem;
        }

        .logo-group h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5rem;
            color: var(--text-main);
            letter-spacing: 0.05em;
            transform: rotate(-2deg);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            background: rgba(15, 23, 42, 0.1);
            border-radius: 999px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        /* Upload Card */
        .upload-card {
            grid-column: span 4;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .upload-zone {
            flex: 1;
            border: var(--border-width) dashed var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(15, 23, 42, 0.1);
        }

        .upload-zone:hover,
        .upload-zone.dragging {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .upload-icon {
            font-size: 2.5rem;
            background: var(--primary-light);
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            color: var(--primary);
        }

        .upload-btn {
            background: var(--primary);
            color: var(--surface);
            border: var(--border-width) solid var(--border);
            padding: 1rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px 0px var(--border);
        }

        .upload-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px 0px var(--border);
        }

        /* Queue Card */
        .queue-card {
            grid-column: span 8;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 400;
            font-family: 'Patrick Hand', cursive;
            color: var(--text-main);
        }

        .refresh-btn {
            background: transparent;
            border: var(--border-width) solid var(--border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(15, 23, 42, 0.1);
            color: var(--text-main);
        }

        /* Table */
        .table-container {
            flex: 1;
            overflow-y: auto;
            margin-right: -0.5rem;
            padding-right: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-main);
            text-transform: uppercase;
            border-bottom: var(--border-width) solid var(--border);
        }

        td {
            padding: 1rem 0.5rem;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(15, 23, 42, 0.1);
            color: var(--text-main);
        }

        .status-pill {
            padding: 0.25rem 0.6rem;
            border: 2px solid var(--border);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .pill-not_started {
            background: rgba(15, 23, 42, 0.1);
            color: #334155;
        }

        .pill-processing {
            background: var(--primary-light);
            color: var(--primary);
        }

        .pill-completed {
            background: var(--success-light);
            color: var(--success);
        }

        .pill-failed {
            background: var(--error-light);
            color: var(--error);
        }

        .btn-view {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text-main);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-view:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: var(--border-width) solid var(--border);
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
            box-shadow: 8px 8px 0px 0px var(--border);
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 2rem;
            overflow-y: auto;
        }

        pre {
            background: #bae6fd;
            border: var(--border-width) solid var(--border);
            padding: 1.25rem;
            border-radius: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #0f172a;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
                overflow-y: auto;
                padding: 1rem;
            }

            .card {
                grid-column: span 12 !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="card header-card">
            <div class="logo-group">
                <h1>OCR</h1>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="status-badge" id="apiDocBtn"
                    style="cursor: pointer; background: var(--primary-light); border-color: var(--primary);">
                    <span style="color: var(--primary); font-weight: 600;">API DOC</span>
                </div>
                <div class="status-badge">
                    <div class="status-dot" id="healthDot"></div>
                    <span id="healthText">Service Online</span>
                </div>
            </div>
        </header>

        <!-- Upload -->
        <div class="card upload-card">
            <div class="card-header">
                <span class="card-title">Input</span>
            </div>
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">↑</div>
                <div>
                    <p style="font-weight: 600;">Drop image here</p>
                    <p style="font-size: 0.8rem; color: var(--text-dim);">PNG, JPG, PDF, TIFF</p>
                </div>
                <input type="file" id="fileInput" hidden accept="image/*,application/pdf">
            </div>
            <button class="upload-btn" id="uploadBtn">Process Image</button>
        </div>

        <!-- Queue -->
        <div class="card queue-card">
            <div class="card-header">
                <span class="card-title">Recent Activity</span>
                <button class="refresh-btn" onclick="loadFiles()">Refresh</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>File</th>
                            <th>Status</th>
                            <th>Progress</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="queueBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="card-title">Extracted Content</span>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="resultText"></pre>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let filesData = [];

        // Elements
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const queueBody = document.getElementById('queueBody');

        // Drag & Drop
        uploadZone.onclick = () => fileInput.click();
        uploadZone.ondragover = (e) => { e.preventDefault(); uploadZone.classList.add('dragging'); };
        uploadZone.ondragleave = () => uploadZone.classList.remove('dragging');
        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragging');
            handleFile(e.dataTransfer.files[0]);
        };

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            window.selectedFile = file;
            uploadZone.querySelector('p').innerText = file.name;
        }

        document.getElementById('uploadBtn').onclick = async () => {
            if (!window.selectedFile) return alert('Select a file first');

            const formData = new FormData();
            formData.append('image', window.selectedFile);

            try {
                const res = await fetch(`${API_BASE}/tasks/upload`, { method: 'POST', body: formData });
                if (res.ok) {
                    window.selectedFile = null;
                    uploadZone.querySelector('p').innerText = 'Drop image here';
                    loadFiles();
                }
            } catch (err) { console.error(err); }
        };

        async function loadFiles() {
            try {
                const res = await fetch(`${API_BASE}/tasks`);
                const data = await res.json();
                filesData = data;
                renderQueue(data);
            } catch (err) { console.error(err); }
        }

        function renderQueue(files) {
            if (files.length === 0) {
                queueBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:3rem; color:var(--text-dim);">No tasks found</td></tr>';
                return;
            }

            queueBody.innerHTML = files.map(f => `
                <tr>
                    <td style="font-weight:500;">${f.filename}</td>
                    <td><span class="status-pill pill-${f.status}">${f.status.replace('_', ' ')}</span></td>
                    <td>
                        <div style="width:100px; height:4px; background:rgba(15, 23, 42, 0.2); border-radius:2px; overflow:hidden;">
                            <div style="width:${f.progress}%; height:100%; background:var(--primary);"></div>
                        </div>
                    </td>
                    <td>
                        ${f.status === 'completed' ? `<button class="btn-view" onclick="showResult('${f.id}')">View</button>` : '—'}
                    </td>
                </tr>
            `).join('');
        }


        async function showResult(id) {
            const res = await fetch(`${API_BASE}/tasks/${id}`);
            const data = await res.json();
            const text = data.ocr_text;

            document.querySelector('#resultModal .card-title').innerText = "Extracted Content";

            let formatted = text;
            try {
                const parsed = JSON.parse(text);
                formatted = JSON.stringify(parsed, null, 2);
            } catch (e) { }

            document.getElementById('resultText').innerText = formatted;
            document.getElementById('resultModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
        }

        document.getElementById('apiDocBtn').onclick = () => {
            const doc = {
                "base_url": window.location.origin,
                "endpoints": [
                    {
                        "method": "POST",
                        "path": "/api/tasks/upload",
                        "desc": "Upload image for OCR",
                        "body": "multipart/form-data { image: file }"
                    },
                    {
                        "method": "GET",
                        "path": "/api/tasks",
                        "desc": "List all tasks"
                    },
                    {
                        "method": "GET",
                        "path": "/api/tasks/{task_id}",
                        "desc": "Get task details & OCR result"
                    },
                    {
                        "method": "GET",
                        "path": "/health",
                        "desc": "Service health check"
                    }
                ],
                "example_usage": "curl -X POST -F 'image=@file.jpg' " + window.location.origin + "/api/tasks/upload"
            };
            document.getElementById('resultText').innerText = JSON.stringify(doc, null, 2);
            document.querySelector('#resultModal .card-title').innerText = "API Documentation";
            document.getElementById('resultModal').classList.add('active');
        };

        // Health Check
        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                const dot = document.getElementById('healthDot');
                dot.style.background = data.status === 'healthy' ? 'var(--success)' : 'var(--error)';
                dot.style.boxShadow = `0 0 10px ${data.status === 'healthy' ? 'var(--success)' : 'var(--error)'}`;
            } catch (e) { }
        }

        // Init
        loadFiles();
        setInterval(loadFiles, 5000);
        setInterval(checkHealth, 10000);
    </script>
</body>

</html>
